<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Antimatter | 3D Space Flight Presentation</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f7f7;
      --muted: rgba(230, 230, 230, 0.7);
      --line: rgba(255, 255, 255, 0.14);
      --glass: rgba(7, 8, 11, 0.44);
      --accent: #ffffff;
      --hot: #d7d7d7;
      --gold: #a9a9a9;
      --green: #eeeeee;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #02040b;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 920vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 42% 18%, rgba(255, 255, 255, 0.08), transparent 34rem),
        radial-gradient(circle at 72% 76%, rgba(180, 180, 180, 0.06), transparent 30rem),
        linear-gradient(180deg, #010207 0%, #03040a 48%, #010103 100%);
      overflow-x: hidden;
    }

    body.is-focused {
      overflow: hidden;
    }

    #space-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: pan-y;
      cursor: default;
    }

    #space-stage.is-hovering {
      cursor: pointer;
    }

    #vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(1, 1, 4, 0.64), transparent 30%, transparent 70%, rgba(1, 1, 4, 0.62)),
        radial-gradient(circle at center, transparent 20%, rgba(0, 0, 0, 0.82) 100%);
      mix-blend-mode: multiply;
    }

    .hud {
      position: fixed;
      z-index: 2;
      left: clamp(1rem, 3vw, 2.6rem);
      right: clamp(1rem, 3vw, 2.6rem);
      top: max(1rem, env(safe-area-inset-top));
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      pointer-events: none;
    }

    .title-lockup {
      max-width: min(34rem, 76vw);
    }

    .eyebrow {
      margin: 0 0 0.45rem;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.25rem, 7vw, 6.8rem);
      line-height: 0.88;
      font-weight: 900;
      letter-spacing: 0;
      color: rgba(255, 255, 255, 0.94);
      text-shadow: 0 0 2.8rem rgba(255, 255, 255, 0.16);
    }

    .hud-note {
      max-width: 17rem;
      margin-top: 0.15rem;
      padding: 0.8rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(2, 8, 18, 0.32);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      font-size: 0.84rem;
      line-height: 1.35;
    }

    .timeline-readout {
      position: fixed;
      z-index: 4;
      top: max(1rem, env(safe-area-inset-top));
      right: clamp(1rem, 3vw, 2.6rem);
      width: auto;
      padding: 0;
      border: 0;
      border-radius: 0;
      color: rgba(255, 255, 255, 0.86);
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      pointer-events: none;
      box-shadow: none;
      text-align: right;
    }

    .timeline-readout .label {
      display: none;
    }

    .timeline-readout .time {
      margin: 0;
      font-variant-numeric: tabular-nums;
      font-size: clamp(0.82rem, 1.6vw, 1rem);
      font-weight: 600;
      letter-spacing: 0;
      line-height: 1.25;
      text-transform: lowercase;
    }

    .timeline-readout .epoch {
      display: none;
    }

    .progress,
    .node-dots {
      display: none;
    }

    .scroll-cue {
      position: fixed;
      z-index: 2;
      left: 50%;
      bottom: max(1.2rem, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      color: rgba(246, 251, 255, 0.72);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .floating-briefs {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .brief-card {
      position: absolute;
      width: min(28rem, 82vw);
      padding: 0;
      color: rgba(247, 247, 247, 0.92);
      text-shadow: 0 0 1.4rem rgba(0, 0, 0, 0.75);
      opacity: 0;
      transform: translate3d(-50%, -50%, 0) scale(0.96);
      transition: opacity 220ms ease, transform 220ms ease;
      will-change: transform, opacity;
    }
    
    .brief-card.is-visible {
        opacity: 1;
        transform: translate3d(-50%, -50%, 0) scale(1);
    }

    .brief-card::before {
      content: "";
      position: absolute;
      left: -1.1rem;
      top: 0.32rem;
      width: 1px;
      height: calc(100% - 0.6rem);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.08));
    }

    .brief-card .node-time {
      margin: 0 0 0.5rem;
      color: rgba(255, 255, 255, 0.58);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brief-card h2 {
      margin: 0;
      font-size: clamp(1.65rem, 4vw, 3.4rem);
      line-height: 0.96;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brief-card .subtitle {
      margin: 0.8rem 0 0;
      max-width: 35rem;
      color: rgba(238, 238, 238, 0.74);
      font-size: clamp(0.95rem, 1.8vw, 1.1rem);
      line-height: 1.52;
    }

    .brief-card .detail {
      margin: 1rem 0 0;
      color: rgba(230, 230, 230, 0.64);
      font-size: 0.88rem;
      line-height: 1.48;
    }

    .scroll-cue::after {
      content: "";
      display: block;
      width: 1px;
      height: 2.8rem;
      margin: 0.7rem auto 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.76), transparent);
      animation: cue-pulse 1.4s ease-in-out infinite;
    }

    @keyframes cue-pulse {
      0%, 100% { transform: scaleY(0.55); opacity: 0.52; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    .panel-shell {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms ease;
    }

    .panel-shell.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .content-card {
      width: min(43rem, 100%);
      max-height: min(78vh, 52rem);
      overflow: auto;
      padding: clamp(1.1rem, 3vw, 2.1rem);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(9, 17, 34, 0.78), rgba(4, 7, 17, 0.58));
      box-shadow: 0 1.4rem 5rem rgba(0, 0, 0, 0.56), inset 0 1px 0 rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(24px) saturate(135%);
      -webkit-backdrop-filter: blur(24px) saturate(135%);
      transform: translate3d(1.3rem, 0, 0) scale(0.98);
      transition: transform 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
      scrollbar-width: thin;
      scrollbar-color: rgba(119, 227, 255, 0.7) transparent;
    }

    .panel-shell.is-open .content-card {
      transform: translate3d(0, 0, 0) scale(1);
    }

    .kicker {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin: 0 0 0.75rem;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .kicker::before {
      content: "";
      width: 0.64rem;
      height: 0.64rem;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 1.2rem currentColor;
    }

    #panel-title {
      margin: 0;
      font-size: clamp(1.65rem, 5vw, 3.05rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    #panel-subtitle {
      margin: 0.72rem 0 1.35rem;
      color: rgba(246, 251, 255, 0.8);
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.45;
    }

    .panel-section {
      padding-block: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    .panel-section h3 {
      margin: 0 0 0.55rem;
      color: #ffffff;
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .panel-section p,
    .panel-section li {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.6;
    }

    .panel-section p {
      margin: 0;
    }

    .panel-section ul {
      margin: 0;
      padding-left: 1.1rem;
    }

    .source-list a {
      color: #d5fbff;
      text-decoration-color: rgba(119, 227, 255, 0.55);
      text-underline-offset: 0.2rem;
    }

    .button-row {
      display: flex;
      justify-content: flex-end;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    #close-panel {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      padding: 0.84rem 1rem;
      color: #041019;
      background: linear-gradient(135deg, #baf5ff, #ffd6e9);
      font: inherit;
      font-weight: 900;
      letter-spacing: 0.02em;
      box-shadow: 0 0.8rem 2.4rem rgba(119, 227, 255, 0.25);
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    #close-panel:hover,
    #close-panel:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 1rem 2.8rem rgba(255, 111, 177, 0.25);
      outline: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 760px) {
      body {
        min-height: 980vh;
      }

      .hud {
        display: block;
      }

      .title-lockup {
        max-width: 92vw;
      }

      .hud-note {
        display: none;
      }

      .timeline-readout {
        top: max(1rem, env(safe-area-inset-top));
        right: 1rem;
        left: auto;
        bottom: auto;
      }

      .brief-card {
        width: min(20rem, 78vw);
      }

      .brief-card h2 {
        font-size: clamp(1.35rem, 8vw, 2.25rem);
      }

      .progress {
        left: 0.65rem;
        height: 38vh;
      }

      .node-dots {
        right: 0.75rem;
      }

      .panel-shell {
        place-items: end stretch;
        padding: 1rem;
      }

      .content-card {
        width: 100%;
        max-height: 74vh;
      }

      .scroll-cue {
        font-size: 0.68rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .scroll-cue::after {
        animation: none;
      }

      .content-card,
      .panel-shell,
      #close-panel {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="space-stage" aria-label="Interactive 3D antimatter space flight"></canvas>
  <div id="vignette" aria-hidden="true"></div>

  <header class="hud" aria-label="Presentation title">
    <div class="title-lockup">
      <p class="eyebrow">Modern Physics Assignment</p>
      <h1>Antimatter</h1>
    </div>
  </header>

  <div class="progress" aria-hidden="true"><span></span></div>
  <nav class="node-dots" aria-label="Milestone progress"></nav>
  <div class="timeline-readout" aria-live="polite">
    <p class="label" id="timeline-label"></p>
    <p class="time" id="timeline-time">Time: 0 (The Big Bang)</p>
    <p class="epoch" id="timeline-epoch">The universe begins as pure energy.</p>
  </div>
  <div class="floating-briefs" id="floating-briefs" aria-live="polite"></div>
  <div class="scroll-cue" aria-hidden="true">Scroll to launch</div>

  <aside class="panel-shell" id="panel-shell" aria-hidden="true">
    <article class="content-card" role="dialog" aria-modal="true" aria-labelledby="panel-title">
      <p class="kicker" id="panel-kicker"></p>
      <h2 id="panel-title"></h2>
      <p id="panel-subtitle"></p>
      <div id="panel-sections"></div>
      <div class="button-row">
        <button id="close-panel" type="button">Close / Resume Flight</button>
      </div>
    </article>
  </aside>

  <p class="sr-only" id="instructions">Use the page scroll to navigate. Interactive nodes open content cards about antimatter.</p>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    if ("scrollRestoration" in history) history.scrollRestoration = "manual";

    const PROJECT_DATA = {
      title: "Antimatter",
      scrollLength: 8.8,
      timeline: {
        label: "Cosmic Timeline",
        startLabel: "time: 0",
        startEpoch: "The universe begins as pure energy.",
        presentSeconds: 13_800_000_000 * 365.25 * 24 * 60 * 60
      },
      milestones: [
        {
          id: "first-microsecond",
          node: 1,
          title: "The First Microsecond",
          shortTitle: "The Perfect Balance",
          timelineTarget: {
            seconds: 1e-6,
            label: "Time: 10^-6 seconds",
            epoch: "The first microsecond after the Big Bang"
          },
          subtitle: "The universe begins like a flawless equation: energy hardens into matter and antimatter in a near-perfect 1:1 balance.",
          color: "#f7f7f7",
          accent: "#bdbdbd",
          position: { x: -5.8, y: 1.2, z: -42 },
          sections: [
            {
              heading: "Pure Energy Becomes Particles",
              body: "In the first microsecond, the newborn universe is hot enough for energy to become mass. Einstein's E=mc^2 is not a slogan here; it is the engine. Photons and fields collide, turning raw energy into quarks, antiquarks, electrons, and positrons."
            },
            {
              heading: "The Perfect Balance",
              body: "For every matter particle, physics expects an antimatter partner with the same mass and opposite charge or quantum identity. The early universe should have been a mirrored ledger: quarks balanced by antiquarks, electrons by positrons, possibility by cancellation."
            },
            {
              heading: "The First Clue",
              bullets: [
                "If the creation ratio stayed exactly 1:1, matter and antimatter should have erased each other almost completely.",
                "The mystery is not that antimatter exists; the mystery is why any matter remained.",
                "This presentation follows the evidence trail from that first microscopic imbalance to every galaxy visible today."
              ]
            }
          ]
        },
        {
          id: "cosmic-tug-of-war",
          node: 2,
          title: "The Cosmic Tug-of-War",
          shortTitle: "Total Annihilation",
          timelineTarget: {
            seconds: 1,
            label: "Time: 1 second",
            epoch: "The annihilation derby"
          },
          subtitle: "Matter and antimatter collide in a universe-wide demolition derby, and ordinary matter survives by a margin almost too small to believe.",
          color: "#eeeeee",
          accent: "#8f8f8f",
          position: { x: 6.2, y: -0.8, z: -122 },
          sections: [
            {
              heading: "Mutual Destruction",
              body: "As the universe cools, matter and antimatter partners find each other and annihilate. Their mass flashes back into radiation. The early cosmos becomes a chaotic arena of creation, collision, and erasure."
            },
            {
              heading: "The Baryon Asymmetry Problem",
              body: "The central mystery is called the Baryon Asymmetry Problem: why did regular matter out-cheat antimatter at all? A common way to picture the imbalance is roughly one extra matter particle for every billion matter-antimatter pairs."
            },
            {
              heading: "The Debris Became Everything",
              bullets: [
                "Almost everything annihilates, leaving radiation as the dominant radioactive debris field.",
                "The tiny leftover matter surplus becomes protons, neutrons, atoms, stars, galaxies, planets, and bodies.",
                "Every solid thing is evidence that the early universe broke perfect symmetry."
              ]
            }
          ]
        },
        {
          id: "recreating-the-dawn",
          node: 3,
          title: "Recreating the Dawn",
          shortTitle: "CERN",
          timelineTarget: {
            seconds: 13_800_000_000 * 365.25 * 24 * 60 * 60,
            label: "Time: 13.8 billion years",
            epoch: "Present Day / The Human Era"
          },
          subtitle: "Modern accelerators become time machines: humans smash particles near light speed to search for the first microsecond's missing clue.",
          color: "#f2f2f2",
          accent: "#a4a4a4",
          position: { x: -6.4, y: 0.35, z: -205 },
          sections: [
            {
              heading: "Accelerators as Time Machines",
              body: "Particle accelerators such as CERN's machines do not merely make exotic particles. They recreate tiny flashes of early-universe conditions by smashing protons at about 99.9% the speed of light, forcing energy back into matter-antimatter pairs."
            },
            {
              heading: "Prediction and Proof",
              bullets: [
                "In 1928, Paul Dirac's relativistic electron equation implied a positive-charge counterpart to the electron.",
                "In 1932, Carl Anderson found that counterpart in cosmic-ray cloud chamber tracks: the positron.",
                "Those discoveries turned antimatter from mathematical shadow into measurable physical evidence."
              ]
            },
            {
              heading: "The Cost of a Clue",
              body: "Antimatter production remains painfully inefficient. A common estimate places the cost near $62.5 trillion per gram, so today's antimatter is not a fuel reserve. It is a rare laboratory signal used to interrogate the universe's first broken symmetry."
            }
          ]
        },
        {
          id: "capturing-ghosts",
          node: 4,
          title: "Capturing and Leveraging Ghosts",
          shortTitle: "Penning Traps & PET Scans",
          timelineTarget: {
            seconds: 13_800_000_000 * 365.25 * 24 * 60 * 60,
            label: "Time: 13.8 billion years",
            epoch: "Present Day / Modern Technology"
          },
          subtitle: "Artificial antimatter is volatile, expensive, and ghostlike, so we suspend it in fields and use its annihilation signatures with extreme care.",
          color: "#f5f5f5",
          accent: "#9a9a9a",
          position: { x: 5.6, y: 0.65, z: -288 },
          sections: [
            {
              heading: "Magnetic Ghost Bottles",
              body: "Antimatter cannot sit in an ordinary container because the container is made of matter. Penning Traps isolate charged antiparticles in cryogenic, near-perfect vacuum with strong magnetic fields and electric confinement, letting researchers study whether antimatter obeys the same rules as matter or reveals broken symmetries."
            },
            {
              heading: "PET Scans: Useful Annihilation",
              body: "In Positron Emission Tomography, an injected tracer releases positrons. A positron meets an electron in tissue and annihilates into two gamma rays traveling in opposite directions. Detectors use those paired signals to map biological activity and help locate cancer."
            },
            {
              heading: "Horizons",
              body: "Antimatter-catalyzed propulsion concepts imagine using tiny amounts of antimatter to trigger or intensify nuclear reactions for deep-space travel. The energy density is tempting, but production, storage, safety, and engine design keep it on the horizon."
            },
            {
              heading: "Academic Sources",
              sources: [
                {
                  label: "CERN: ALPHA experiment and antimatter research",
                  url: "https://home.cern/science/experiments/alpha"
                },
                {
                  label: "NASA Glenn Research Center: advanced propulsion research",
                  url: "https://www1.grc.nasa.gov/"
                },
                {
                  label: "Nobel Prize archive: Carl D. Anderson and the positron",
                  url: "https://www.nobelprize.org/prizes/physics/1936/anderson/facts/"
                },
                {
                  label: "Nobel Prize archive: Paul A. M. Dirac",
                  url: "https://www.nobelprize.org/prizes/physics/1933/dirac/facts/"
                }
              ]
            }
          ]
        },
        {
          id: "earth-present",
          node: 5,
          title: "Earth: The Matter That Remained",
          shortTitle: "Present Day",
          timelineTarget: {
            seconds: 13_800_000_000 * 365.25 * 24 * 60 * 60,
            label: "time: present",
            epoch: "Earth, now"
          },
          subtitle: "The journey ends at the evidence: a matter-built planet where antimatter is rare, dangerous, useful, and still scientifically unfinished.",
          color: "#ffffff",
          accent: "#b8b8b8",
          position: { x: 0.0, y: 0.15, z: -372 },
          sections: [
            {
              heading: "Antimatter Now",
              body: "Today, antimatter appears mostly as fleeting particles in labs, cosmic rays, and medical imaging. Its scarcity tells us the early universe favored matter, but the exact mechanism remains one of modern physics' sharpest open questions."
            },
            {
              heading: "Why It Matters",
              bullets: [
                "PET scans use positron annihilation to reveal activity inside the body.",
                "Experiments compare matter and antimatter to hunt for tiny broken symmetries.",
                "Propulsion concepts imagine antimatter as an extreme energy source, but production and storage remain enormous barriers."
              ]
            }
          ]
        }
      ]
    };

    const THREE = await import("three");

    const canvas = document.querySelector("#space-stage");
    const panelShell = document.querySelector("#panel-shell");
    const panelKicker = document.querySelector("#panel-kicker");
    const panelTitle = document.querySelector("#panel-title");
    const panelSubtitle = document.querySelector("#panel-subtitle");
    const panelSections = document.querySelector("#panel-sections");
    const closeButton = document.querySelector("#close-panel");
    const progressBar = document.querySelector(".progress span");
    const dotNav = document.querySelector(".node-dots");
    const scrollCue = document.querySelector(".scroll-cue");
    const timelineLabel = document.querySelector("#timeline-label");
    const timelineTime = document.querySelector("#timeline-time");
    const timelineEpoch = document.querySelector("#timeline-epoch");
    const floatingBriefs = document.querySelector("#floating-briefs");
    
    timelineLabel.textContent = PROJECT_DATA.timeline.label;
    timelineTime.textContent = PROJECT_DATA.timeline.startLabel;
    timelineEpoch.textContent = PROJECT_DATA.timeline.startEpoch;

    const state = {
      scrollProgress: 0,
      targetProgress: 0,
      flightProgress: 0,
      targetFlightProgress: 0,
      timelineSeconds: 0,
      displayedTimelineSeconds: 0,
      lockedTimelineSeconds: null,
      locked: false,
      activeNode: null,
      hoveredNode: null,
      focusStart: null,
      focusTarget: null,
      focusT: 1,
      returnStart: null,
      returnT: 1,
      savedScrollY: 0,
      pointer: new THREE.Vector2(2, 2),
      pixelRatio: Math.min(window.devicePixelRatio || 1, 2)
    };

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: true,
      powerPreference: "high-performance"
    });
    renderer.setPixelRatio(state.pixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x030611, 0.012);

    const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 260);
    camera.position.set(0, 0.55, 5);

    const raycaster = new THREE.Raycaster();
    const clock = new THREE.Clock();
    const nodes = [];

    // Helper to calculate progress based on z position
    function progressForZ(z) {
        // Find min and max Z from milestones
        const zValues = PROJECT_DATA.milestones.map(m => m.position.z);
        const minZ = Math.min(...zValues);
        // Start Z is where camera starts (5)
        const maxZ = 5; 
        
        // Progress is 0 at maxZ and 1 at minZ
        return (maxZ - z) / (maxZ - minZ);
    }
    
    const timelineStops = PROJECT_DATA.milestones.map((item, index) => ({
      item,
      index,
      progress: progressForZ(item.position.z),
      seconds: item.timelineTarget.seconds
    }));

    const trailGroup = new THREE.Group();
    const nodeGroup = new THREE.Group();
    scene.add(trailGroup, nodeGroup);

    addLighting();
    addStarfield();
    addNebulaVeils();
    buildNodesFromData();
    buildBriefCards(); // Add this line
    window.scrollTo(0, 0);
    updateScrollState();

    window.addEventListener("scroll", updateScrollState, { passive: true });
    window.addEventListener("resize", onResize);
    window.addEventListener("pointermove", onPointerMove, { passive: true });
    window.addEventListener("pointerleave", clearHover, { passive: true });
    window.addEventListener("click", onCanvasClick);
    closeButton.addEventListener("click", closePanel);
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && state.locked) closePanel();
    });

    animate();

    function addLighting() {
      scene.add(new THREE.AmbientLight(0x9bbcff, 0.32));

      const cyan = new THREE.PointLight(0x77e3ff, 3.2, 72);
      cyan.position.set(-8, 5, -24);
      scene.add(cyan);

      const rose = new THREE.PointLight(0xff6fb1, 2.4, 86);
      rose.position.set(8, -4, -58);
      scene.add(rose);

      const gold = new THREE.DirectionalLight(0xffe4a3, 1.25);
      gold.position.set(1.4, 2.2, 1);
      scene.add(gold);
    }

    function addStarfield() {
      const count = 5200;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const color = new THREE.Color();

      for (let i = 0; i < count; i++) {
        const radius = 10 + Math.random() * 34;
        const angle = Math.random() * Math.PI * 2;
        const z = -Math.random() * 400 + 8; // Extended Z range to match milestones
        const lane = Math.sin(z * 0.16) * 3.2;
        positions[i * 3] = Math.cos(angle) * radius + lane;
        positions[i * 3 + 1] = Math.sin(angle) * radius * 0.72 + (Math.random() - 0.5) * 7;
        positions[i * 3 + 2] = z;

        color.setHSL(0.55 + Math.random() * 0.18, 0.55, 0.62 + Math.random() * 0.34);
        colors[i * 3] = color.r;
        colors[i * 3 + 1] = color.g;
        colors[i * 3 + 2] = color.b;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

      const material = new THREE.PointsMaterial({
        size: 0.055,
        vertexColors: true,
        transparent: true,
        opacity: 0.88,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      const stars = new THREE.Points(geometry, material);
      stars.name = "generated-starfield";
      scene.add(stars);

      const streakGeometry = new THREE.BufferGeometry();
      const streakCount = 900;
      const streakPositions = new Float32Array(streakCount * 2 * 3);
      for (let i = 0; i < streakCount; i++) {
        const x = (Math.random() - 0.5) * 52;
        const y = (Math.random() - 0.5) * 30;
        const z = -Math.random() * 400 + 4; // Extended Z range
        const len = 0.28 + Math.random() * 1.4;
        streakPositions.set([x, y, z, x, y, z - len], i * 6);
      }
      streakGeometry.setAttribute("position", new THREE.BufferAttribute(streakPositions, 3));
      const streaks = new THREE.LineSegments(
        streakGeometry,
        new THREE.LineBasicMaterial({
          color: 0x8bdcff,
          transparent: true,
          opacity: 0.12,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      );
      scene.add(streaks);
    }

    function addNebulaVeils() {
      const veilMaterial = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        side: THREE.DoubleSide,
        uniforms: {
          uTime: { value: 0 },
          uColorA: { value: new THREE.Color("#77e3ff") },
          uColorB: { value: new THREE.Color("#ff6fb1") }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          precision highp float;
          uniform float uTime;
          uniform vec3 uColorA;
          uniform vec3 uColorB;
          varying vec2 vUv;

          float wave(vec2 p) {
            return sin(p.x * 8.0 + uTime * 0.22) * sin(p.y * 5.0 - uTime * 0.18);
          }

          void main() {
            vec2 centered = vUv - 0.5;
            float radial = smoothstep(0.54, 0.08, length(centered));
            float smoke = wave(vUv) * 0.5 + 0.5;
            vec3 color = mix(uColorA, uColorB, smoothstep(0.2, 0.9, vUv.x + smoke * 0.25));
            gl_FragColor = vec4(color, radial * (0.07 + smoke * 0.055));
          }
        `
      });

      for (let i = 0; i < 15; i++) { // Increased number of veils
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(42, 24, 1, 1), veilMaterial.clone());
        mesh.position.set((i % 2 ? 1 : -1) * (8 + i * 2), (i - 2) * 1.1, -14 - i * 26);
        mesh.rotation.set(0.3 - i * 0.07, 0.7 + i * 0.2, 0.25 + i * 0.3);
        mesh.userData.veil = true;
        scene.add(mesh);
      }
    }
    
    function createNodeCore(index, color, accent) {
        // Provide a simple core mesh implementation
        const geometry = new THREE.IcosahedronGeometry(1.2, 1);
        const material = new THREE.MeshBasicMaterial({
            color: color,
            wireframe: true,
            transparent: true,
            opacity: 0.6
        });
        const mesh = new THREE.Mesh(geometry, material);
        return mesh;
    }
    
    function addFlightThread(pos1, pos2, colorStr) {
        // Implement flight thread connections
        const material = new THREE.LineBasicMaterial({
            color: new THREE.Color(colorStr),
            transparent: true,
            opacity: 0.2
        });
        
        const points = [];
        points.push(new THREE.Vector3(pos1.x, pos1.y, pos1.z));
        points.push(new THREE.Vector3(pos2.x, pos2.y, pos2.z));
        
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(geometry, material);
        trailGroup.add(line);
    }

    function buildNodesFromData() {
      PROJECT_DATA.milestones.forEach((item, index) => {
        const root = new THREE.Group();
        root.position.set(item.position.x, item.position.y, item.position.z);
        root.userData = { item, index, interactive: true };
        root.name = item.id;

        const color = new THREE.Color(item.color);
        const accent = new THREE.Color(item.accent);
        const core = createNodeCore(index, color, accent);
        root.add(core);

        const labelAnchor = new THREE.Mesh(
          new THREE.SphereGeometry(0.18, 16, 16),
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.0 })
        );
        labelAnchor.userData = { item, index, interactive: true, root };
        root.add(labelAnchor);

        const halo = new THREE.Mesh(
          new THREE.SphereGeometry(1.45 + index * 0.08, 64, 32),
          new THREE.MeshBasicMaterial({
            color,
            transparent: true,
            opacity: 0.055,
            wireframe: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
          })
        );
        root.add(halo);

        const collision = new THREE.Mesh(
          new THREE.SphereGeometry(2.5, 32, 16), // Made slightly larger to ensure it's clickable
          new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
        );
        collision.userData = { item, index, interactive: true, root };
        root.add(collision);

        nodeGroup.add(root);
        nodes.push({ root, core, halo, collision, item, index, baseScale: 1 });

        if (index > 0) addFlightThread(PROJECT_DATA.milestones[index - 1].position, item.position, item.color);
      });
    }
    
    function buildBriefCards() {
        PROJECT_DATA.milestones.forEach((item) => {
            const card = document.createElement("div");
            card.className = "brief-card";
            card.id = `brief-${item.id}`;
            
            card.innerHTML = `
                <p class="node-time">${item.timelineTarget.label}</p>
                <h2>${item.title}</h2>
                <p class="subtitle">${item.subtitle}</p>
                <p class="detail">Click node to expand details</p>
            `;
            
            floatingBriefs.appendChild(card);
        });
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    function updateScrollState() {
        if (state.locked) return;
        
        const scrollMax = document.body.scrollHeight - window.innerHeight;
        if (scrollMax <= 0) return;
        
        state.targetProgress = window.scrollY / scrollMax;
        
        if (window.scrollY > 20 && scrollCue.style.opacity !== "0") {
            scrollCue.style.opacity = "0";
        }
    }
    
    function onPointerMove(event) {
        if (state.locked) return;
        
        state.pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
        state.pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
        
        checkHover();
    }
    
    function checkHover() {
        raycaster.setFromCamera(state.pointer, camera);
        
        // Use recursive true to check all children of nodeGroup
        const intersects = raycaster.intersectObjects(nodeGroup.children, true);
        
        let foundNode = null;
        
        for (const intersect of intersects) {
            let obj = intersect.object;
            // Trace up to find the root node group with our userData
            while (obj && (!obj.userData || !obj.userData.interactive)) {
                if (obj.parent) obj = obj.parent;
                else break;
            }
            
            if (obj && obj.userData && obj.userData.interactive) {
                foundNode = obj.userData.root || obj; // Use the root group
                break;
            }
        }
        
        if (foundNode !== state.hoveredNode) {
            if (state.hoveredNode) {
                // Reset previous hover
                const nodeData = nodes.find(n => n.root === state.hoveredNode);
                if (nodeData) {
                    nodeData.core.scale.setScalar(1);
                    nodeData.halo.material.opacity = 0.055;
                }
            }
            
            state.hoveredNode = foundNode;
            
            if (state.hoveredNode) {
                canvas.classList.add("is-hovering");
                const nodeData = nodes.find(n => n.root === state.hoveredNode);
                if (nodeData) {
                    nodeData.core.scale.setScalar(1.1);
                    nodeData.halo.material.opacity = 0.15;
                }
            } else {
                canvas.classList.remove("is-hovering");
            }
        }
    }
    
    function clearHover() {
        state.pointer.x = 2;
        state.pointer.y = 2;
        checkHover();
    }
    
    function onCanvasClick() {
        if (state.locked || !state.hoveredNode) return;
        
        const nodeData = nodes.find(n => n.root === state.hoveredNode);
        if (nodeData) {
            openPanel(nodeData);
        }
    }
    
    function calculateTimeForProgress(progress) {
        // More complex interpolation between timelineStops
        if (progress <= timelineStops[0].progress) {
            return timelineStops[0].seconds;
        }
        
        if (progress >= timelineStops[timelineStops.length - 1].progress) {
            return timelineStops[timelineStops.length - 1].seconds;
        }
        
        // Find segment
        for (let i = 0; i < timelineStops.length - 1; i++) {
            const current = timelineStops[i];
            const next = timelineStops[i + 1];
            
            if (progress >= current.progress && progress <= next.progress) {
                const segmentT = (progress - current.progress) / (next.progress - current.progress);
                
                // Use exponential interpolation for time because it spans vast scales
                // Handle cases where time is 0 or very small
                const val1 = Math.max(1e-10, current.seconds);
                const val2 = Math.max(1e-10, next.seconds);
                
                const logVal = Math.log(val1) + segmentT * (Math.log(val2) - Math.log(val1));
                return Math.exp(logVal);
            }
        }
        
        return 0;
    }
    
    function formatTime(seconds) {
        if (seconds < 1e-5) return "10^-6 seconds";
        if (seconds < 60) return `${Math.round(seconds)} seconds`;
        if (seconds < 3600) return `${Math.round(seconds/60)} minutes`;
        if (seconds < 86400) return `${Math.round(seconds/3600)} hours`;
        if (seconds < 31536000) return `${Math.round(seconds/86400)} days`;
        
        const years = seconds / 31536000;
        if (years < 1000) return `${Math.round(years)} years`;
        if (years < 1000000) return `${Math.round(years/1000)} thousand years`;
        if (years < 1000000000) return `${Math.round(years/1000000)} million years`;
        return `${(years/1000000000).toFixed(1)} billion years`;
    }
    
    function updateTimelineDisplay(seconds) {
        // Find closest epoch text
        let epochText = PROJECT_DATA.timeline.startEpoch;
        let diff = Number.MAX_VALUE;
        
        for (const stop of timelineStops) {
            const stopDiff = Math.abs(stop.seconds - seconds);
            // Log scale diff is better for these huge ranges
            const logDiff = Math.abs(Math.log(Math.max(1e-10, stop.seconds)) - Math.log(Math.max(1e-10, seconds)));
            if (logDiff < 1.0) { // If we're reasonably close in magnitude
                epochText = stop.item.timelineTarget.epoch;
            }
        }
        
        timelineTime.textContent = `Time: ${formatTime(seconds)}`;
        timelineEpoch.textContent = epochText;
    }
    
    function openPanel(nodeData) {
        state.locked = true;
        state.activeNode = nodeData;
        state.savedScrollY = window.scrollY;
        
        // Setup camera animation
        state.focusStart = camera.position.clone();
        
        // Calculate a target position slightly offset from the node to view it well
        const offset = new THREE.Vector3(2, 0.5, 5); 
        state.focusTarget = nodeData.root.position.clone().add(offset);
        
        state.focusT = 0;
        
        // Lock timeline
        state.lockedTimelineSeconds = nodeData.item.timelineTarget.seconds;
        
        // Update DOM elements
        document.body.classList.add('is-focused');
        canvas.classList.remove("is-hovering");
        
        // Hide floating briefs
        document.querySelectorAll('.brief-card').forEach(card => card.classList.remove('is-visible'));
        
        // Populate Panel
        panelKicker.textContent = nodeData.item.shortTitle;
        panelTitle.textContent = nodeData.item.title;
        panelSubtitle.textContent = nodeData.item.subtitle;
        
        // Generate sections
        let sectionsHTML = '';
        nodeData.item.sections.forEach(sec => {
            sectionsHTML += `<div class="panel-section">
                <h3>${sec.heading}</h3>`;
                
            if (sec.body) {
                sectionsHTML += `<p>${sec.body}</p>`;
            }
            
            if (sec.bullets) {
                sectionsHTML += `<ul>`;
                sec.bullets.forEach(b => sectionsHTML += `<li>${b}</li>`);
                sectionsHTML += `</ul>`;
            }
            
            if (sec.sources) {
                sectionsHTML += `<ul class="source-list">`;
                sec.sources.forEach(s => sectionsHTML += `<li><a href="${s.url}" target="_blank">${s.label}</a></li>`);
                sectionsHTML += `</ul>`;
            }
            
            sectionsHTML += `</div>`;
        });
        
        panelSections.innerHTML = sectionsHTML;
        
        // Show panel
        panelShell.classList.add('is-open');
    }
    
    function closePanel() {
        state.locked = false;
        
        // Setup return animation
        state.returnStart = camera.position.clone();
        state.returnT = 0;
        state.activeNode = null;
        state.lockedTimelineSeconds = null;
        
        document.body.classList.remove('is-focused');
        panelShell.classList.remove('is-open');
        
        // Ensure scroll is restored properly
        window.scrollTo(0, state.savedScrollY);
        updateScrollState(); // Force immediate update of target progress
    }
    
    // Function to calculate exact camera Z for a given progress
    function getCameraZForProgress(progress) {
        const zValues = PROJECT_DATA.milestones.map(m => m.position.z);
        const minZ = Math.min(...zValues);
        // Start Z is where camera starts (5)
        const maxZ = 5; 
        
        // We add some buffer past the last node
        return maxZ - (progress * (maxZ - minZ + 10));
    }
    
    function updateBriefPositions() {
        if (state.locked) return;
        
        nodes.forEach(nodeData => {
            const card = document.getElementById(`brief-${nodeData.item.id}`);
            if (!card) return;
            
            // Project 3D position to screen
            const vector = nodeData.root.position.clone();
            // Offset label to the right
            vector.x += 1.5;
            vector.y += 0.5;
            
            vector.project(camera);
            
            // Check if node is behind camera or too far off screen
            if (vector.z > 1 || vector.x < -1.2 || vector.x > 1.2 || vector.y < -1.2 || vector.y > 1.2) {
                card.classList.remove('is-visible');
                return;
            }
            
            // Convert to CSS coordinates
            const x = (vector.x * .5 + .5) * window.innerWidth;
            const y = (vector.y * -.5 + .5) * window.innerHeight;
            
            card.style.left = `${x}px`;
            card.style.top = `${y}px`;
            
            // Calculate distance to camera to determine opacity
            const dist = camera.position.distanceTo(nodeData.root.position);
            
            // Only show cards when reasonably close but not past them
            if (dist < 30 && camera.position.z > nodeData.root.position.z - 5) {
                card.classList.add('is-visible');
            } else {
                card.classList.remove('is-visible');
            }
        });
    }

    function animate() {
      requestAnimationFrame(animate);
      
      const time = clock.getElapsedTime();

      // Update nebula veils
      scene.children.forEach(child => {
          if (child.userData.veil && child.material.uniforms) {
              child.material.uniforms.uTime.value = time;
          }
      });
      
      // Node idle animations
      nodes.forEach(nodeData => {
          if (nodeData.root !== state.activeNode?.root) {
              nodeData.core.rotation.y = time * 0.2;
              nodeData.core.rotation.x = time * 0.1;
              nodeData.halo.rotation.y = -time * 0.15;
          }
      });

      if (state.locked) {
          // Animate towards active node
          if (state.focusT < 1) {
              state.focusT += 0.02; // ease in out
              const t = state.focusT < 0.5 ? 2 * state.focusT * state.focusT : -1 + (4 - 2 * state.focusT) * state.focusT;
              camera.position.lerpVectors(state.focusStart, state.focusTarget, t);
              
              // Always look at the node while moving towards it
              const lookTarget = state.activeNode.root.position.clone();
              camera.lookAt(lookTarget);
          } else {
             // Slowly drift around the node when fully focused
             const floatOffset = Math.sin(time) * 0.2;
             camera.position.y = state.focusTarget.y + floatOffset;
             camera.lookAt(state.activeNode.root.position);
          }
          
          if (state.lockedTimelineSeconds !== null) {
              state.displayedTimelineSeconds = state.lockedTimelineSeconds;
          }
          
      } else {
          // Normal scroll-based movement
          
          // Smoothly approach target progress
          state.flightProgress += (state.targetProgress - state.flightProgress) * 0.05;
          
          // Calculate camera base position along Z
          const targetZ = getCameraZForProgress(state.flightProgress);
          
          if (state.returnT < 1) {
              // Returning from focus state
              state.returnT += 0.03;
              const t = state.returnT < 0.5 ? 2 * state.returnT * state.returnT : -1 + (4 - 2 * state.returnT) * state.returnT;
              
              const expectedPos = new THREE.Vector3(0, 0.55, targetZ);
              camera.position.lerpVectors(state.returnStart, expectedPos, t);
              
              // Look straight ahead
              const lookDir = new THREE.Vector3(0, 0, targetZ - 10);
              const currentLook = new THREE.Vector3().subVectors(
                  state.focusTarget || new THREE.Vector3(0,0,0), 
                  camera.position
              ).normalize();
              
              // Simplistic look interpolation
              camera.lookAt(lookDir); 
          } else {
              // Normal flight
              camera.position.z = targetZ;
              
              // Subtle mouse look
              const targetLookX = -(state.pointer.x * 2);
              const targetLookY = (state.pointer.y * 1) + 0.55;
              
              const lookTarget = new THREE.Vector3(targetLookX, targetLookY, targetZ - 10);
              camera.lookAt(lookTarget);
          }
          
          // Update timeline based on progress
          const realTimelineSeconds = calculateTimeForProgress(state.flightProgress);
          // Smooth the timeline display to avoid jitter
          state.displayedTimelineSeconds += (realTimelineSeconds - state.displayedTimelineSeconds) * 0.1;
      }
      
      updateTimelineDisplay(state.displayedTimelineSeconds);
      updateBriefPositions();

      renderer.render(scene, camera);
    }
  </script>
