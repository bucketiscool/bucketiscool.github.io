<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beckett Graham | Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fbfbfd; color: #1d1d1f; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.1); }
        .bento-card { background: white; border-radius: 32px; border: 1px solid #e5e7eb; transition: all 0.4s ease; overflow: hidden; }
        .bento-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        @keyframes pulse-bg {
        0% { background-color: #f3f4f6; }
        50% { background-color: #e5e7eb; }
        100% { background-color: #f3f4f6; }
        }
        .animate-pulse-slow {
            animation: pulse-bg 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="antialiased">

    <nav class="glass-nav fixed w-full z-50 top-0">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="font-bold text-xl tracking-tight hover:text-blue-600 transition">Beckett Graham</a>
            <div class="space-x-8 text-sm font-medium hidden md:flex">
                <a href="/" class="hover:text-blue-600 transition">Home</a>
                <a href="/portfolio/" class="hover:text-blue-600 transition">Portfolio</a>
                <a href="/gallery/" class="hover:text-blue-600 transition">Gallery</a>
                <a href="/games/" class="hover:text-blue-600 transition">Games</a>
            </div>
        </div>
    </nav>

    <section class="min-h-screen pt-32 pb-24 max-w-6xl mx-auto px-6">
        <div class="mb-16 text-center" data-aos="fade-up">
            <h1 class="text-5xl font-bold mb-4">Gallery</h1>
            <p class="text-gray-500 text-xl">Projects | Accomplishments | Athletics</p>
        </div>

        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </section>

    <script>
        // --- CONFIGURATION ---
        const repoOwner = "bucketiscool"; 
        const repoName = "bucketiscool.github.io";
        const folderPath = "gallery/photos"; // The path to your images folder

        async function loadGallery() {
            const grid = document.getElementById('gallery-grid');
            
            try {
                // Fetch the list of files from GitHub's API
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`);
                const files = await response.json();

                // Filter to only show image files
                const imageExtensions = ['jpg', 'jpeg', 'png', 'webp', 'gif'];
                const images = files.filter(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    return imageExtensions.includes(ext);
                });

                images.forEach((file, index) => {
    const card = document.createElement('div');
    card.className = "bento-card relative h-80 animate-pulse-slow overflow-hidden bg-gray-100";

    // CDN Logic: This tells Statically to resize and compress the image for the web
    // It converts heavy ARW/JPGs to lightweight WebP files automatically
    const fastUrl = `https://cdn.statically.io/gh/${repoOwner}/${repoName}/main/${file.path}?w=800&f=webp`;

    card.innerHTML = `
        <img src="${fastUrl}" 
             class="absolute inset-0 w-full h-full object-cover hover:scale-105 transition-opacity duration-700 opacity-0" 
             alt="Gallery Image"
             loading="lazy"
             onload="handleImageLoad(this)">
    `;
    grid.appendChild(card);
});

function handleImageLoad(img) {
    img.classList.remove('opacity-0');
    img.parentElement.classList.remove('animate-pulse-slow');
    // Remove background color once loaded to save memory
    img.parentElement.style.backgroundColor = "transparent";
}
            } catch (error) {
                console.error("Error loading images:", error);
                grid.innerHTML = "<p>Error loading photos. Make sure your repo is public!</p>";
            }
        }

        loadGallery();
    </script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 800 });</script>
</body>
</html>
