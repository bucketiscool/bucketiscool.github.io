<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production | Beckett Graham</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fbfbfd; color: #1d1d1f; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.05); }
        .input-style { width: 100%; padding: 1rem; border-radius: 14px; border: 1px solid #e5e5e5; background: #fff; margin-bottom: 1rem; outline: none; transition: border 0.3s; }
        .input-style:focus { border-color: #0071e3; }
    </style>
</head>
<body class="antialiased">
    <div class="max-w-2xl mx-auto px-6 pt-32">
        <div class="glass p-10 rounded-[32px] shadow-sm">
            <h1 class="text-3xl font-bold tracking-tight mb-2">YT Automator</h1>
            <p class="text-gray-500 mb-8">Deploy production renders to YouTube via GitHub Actions.</p>

            <input type="password" id="gh-token" placeholder="GitHub Access Token" class="input-style">
            
            <div class="border-t border-gray-100 my-8"></div>

            <label class="text-[11px] font-bold uppercase tracking-widest text-gray-400">Video Title</label>
            <input type="text" id="vid-title" placeholder="e.g. Funniest Orders" class="input-style">

            <div id="drop-zone" class="border-2 border-dashed border-gray-200 rounded-2xl p-8 text-center cursor-pointer hover:bg-gray-50 transition">
                <p id="file-label" class="text-gray-400">Select Clips (1 for Video, 5 for Ranking)</p>
                <input type="file" id="file-input" multiple class="hidden">
            </div>

            <button id="deploy-btn" class="w-full mt-8 bg-[#0071e3] text-white font-semibold p-4 rounded-2xl hover:bg-[#0077ed] transition">
                Deploy to YouTube
            </button>
            
            <p id="status" class="mt-4 text-center text-sm font-medium"></p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            const count = fileInput.files.length;
            document.getElementById('file-label').innerText = `${count} files selected.`;
        };

        document.getElementById('deploy-btn').onclick = async () => {
            const token = document.getElementById('gh-token').value;
            const title = document.getElementById('vid-title').value;
            const files = fileInput.files;

            if (!token || !title || files.length === 0) {
                alert("Please fill in all fields.");
                return;
            }

            document.getElementById('status').innerText = "Staging files...";
            
            // Logic to push files to GitHub via API
            // This triggers the workflow automatically
            alert("This will push clips to /VideoClips and trigger your YouTube Action.");
        };
    </script>
</body>
</html>
</html>
